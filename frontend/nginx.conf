# Контекст http (файл подключается из conf.d, т.е. внутри http) —
# здесь допустимы map и log_format.

# Сквозной request-id: если фронт/edge уже прислал X-Request-Id — переиспользуем,
# иначе генерим nginx'ом ($request_id). По нему 5xx в этом логе связывается с
# ошибкой в логе Go-бэкенда (DevOps: «на каждый 5xx ↔ ошибка в беке»).
map $http_x_request_id $req_id {
    default   $request_id;
    "~."      $http_x_request_id;
}

# JSON-лог: статус ответа фронту + upstream-статус/время бэкенда + request_id.
log_format iqport_json escape=json '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"method":"$request_method",'
    '"uri":"$uri",'
    '"status":$status,'
    '"upstream_addr":"$upstream_addr",'
    '"upstream_status":"$upstream_status",'
    '"upstream_response_time":"$upstream_response_time",'
    '"request_time":$request_time,'
    '"request_id":"$req_id",'
    '"bytes_sent":$body_bytes_sent,'
    '"referer":"$http_referer",'
    '"user_agent":"$http_user_agent"'
'}';

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Логи фронт-контейнера. Путь можно примонтировать на volume или оставить как
    # есть (в nginx:alpine эти файлы симлинкнуты в stdout) — решает DevOps.
    access_log /var/log/nginx/access.log iqport_json;
    error_log  /var/log/nginx/error.log warn;

    # Отдаём request_id обратно — удобно цитировать в баг-репорте/поддержке.
    add_header X-Request-Id $req_id always;

    # SPA fallback — все маршруты отдаём index.html (Angular router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование API модуля на его Go-бэкенд (см. IQPort §7.2).
    # API_BACKEND подставляется на деплое; по умолчанию — внутренний сервис.
    location /api/ {
        proxy_pass http://api-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Тот же id уходит в бэкенд — он логирует его рядом с ошибкой.
        proxy_set_header X-Request-Id $req_id;
    }

    # Не кэшируем index.html, чтобы клиент сразу видел новый деплой
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
