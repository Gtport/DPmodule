app:
  name: iqport-service
  env: dev

http:
  host: 127.0.0.1   # только loopback — наружу приложение отдаётся через nginx
  port: 8080
  read_timeout: 10s
  write_timeout: 30s
  shutdown_timeout: 15s

metrics:
  port: 9090   # отдельный порт для /metrics; задать = http.port, чтобы отдавать на основном

# Внешние зависимости отключены по умолчанию — шаблон поднимается «голым».
# Переключи enabled: true и заполни секреты (env), когда подключишь зависимость.
postgres:
  enabled: true
  host: localhost
  port: 5432
  dbname: dpport
  user: gtport_app
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

keycloak:
  enabled: true    # /api требует валидный JWT (issuer+audience+подпись); «кто» → в журнал
  jwks_url: http://localhost:8180/realms/iqport/protocol/openid-connect/certs   # внутренний адрес (ключи), доступен бэкенду
  issuer: https://95850.koara.live/realms/iqport   # ДОЛЖЕН совпадать с iss в токене браузера (Keycloak с динамическим hostname подставляет публичный хост и схему). При смене домена/схемы — править здесь.
  audience: iqport-backend

log:
  level: debug
  file: logs/service.log   # лог-файл с ротацией (100 МБ × 5 бэкапов × 30 дней); stdout/journald остаётся
  max_size_mb: 100
  max_backups: 5
  max_age_days: 30

asu:
  enabled: true         # true → фоновый забор дислокации из АСУ по тикеру
  pull_interval: 10m    # период забора (источники — в таблице data_source)
  pull_offset: 5m       # сдвиг от начала часа: тики в :05, :15, :25, :35, :45, :55

wagonops:               # история продвижения вагона (запрос 601, тот же провайдер)
  enabled: true         # true → фоновый разбор очереди заявок (прибытие/пропажа/выбытие-10)
  drain_interval: 15s   # тик воркера; заявки идут пачкой с паузой между запросами
  batch: 50             # заявок за тик (подтверждено владельцем)
  pause: 500ms          # пауза между HTTP-запросами (~2 мин на 200 вагонов)
  max_attempts: 5       # неудач до снятия заявки

reference:              # памятки на подачу/уборку (тот же провайдер, что дислокация)
  enabled: false        # true → фоновый крон-инкремент по тикеру
  base_url: ""          # заполняет владелец (тот же адрес, что у АСУ)
  insecure_tls: false   # true для самоподписанного серта провайдера (аналог curl -k)
  pull_interval: 1h     # период крон-инкремента
  clients: [attis, nmtp] # коды клиентов провайдера: памятки разнесены по клиентам, у каждого свои номера
  # auth_secret_key по умолчанию ASU_TOKEN (env) — ключ X-API-Key того же провайдера

max:                    # рассылка форм в мессенджер MAX (токен бота — env MAX_BOT_TOKEN)
  enabled: true         # канал включён; чаты/маршруты — в БД (таблицы max_chat/max_route)
  base_url: https://platform-api2.max.ru  # Bot API MAX (CA Минцифры вшит в бинарь)
  timeout_secs: 120     # таймаут HTTP (заливка картинок бывает долгой)
  send_delay: 500ms     # пауза между чатами (лимит API 30 rps)
