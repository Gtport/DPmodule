app:
  name: iqport-service
  env: dev

http:
  host: 127.0.0.1   # только loopback — наружу приложение отдаётся через nginx
  port: 8080
  read_timeout: 10s
  write_timeout: 30s
  shutdown_timeout: 15s

metrics:
  port: 9090   # отдельный порт для /metrics; задать = http.port, чтобы отдавать на основном

# Внешние зависимости отключены по умолчанию — шаблон поднимается «голым».
# Переключи enabled: true и заполни секреты (env), когда подключишь зависимость.
postgres:
  enabled: true
  host: localhost
  port: 5432
  dbname: dpport
  user: gtport_app
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

keycloak:
  enabled: true    # /api требует валидный JWT (issuer+audience+подпись); «кто» → в журнал
  jwks_url: http://localhost:8180/realms/iqport/protocol/openid-connect/certs   # внутренний адрес (ключи), доступен бэкенду
  issuer: http://147.45.216.32/realms/iqport   # ДОЛЖЕН совпадать с iss в токене браузера (Keycloak с динамическим hostname подставляет публичный хост). При переходе на https://95850.koara.live — сменить сюда домен.
  audience: iqport-backend

log:
  level: debug
  # file: logs/service.log  # раскомментировать для записи в файл
  max_size_mb: 100
  max_backups: 5
  max_age_days: 30

asu:
  enabled: false        # true → фоновый забор дислокации из АСУ по тикеру
  pull_interval: 10m    # период забора (источники — в таблице data_source)
