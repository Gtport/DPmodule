app:
  name: iqport-service
  env: dev

http:
  host: 127.0.0.1   # только loopback — наружу приложение отдаётся через nginx
  port: 8080
  read_timeout: 10s
  write_timeout: 30s
  shutdown_timeout: 15s

metrics:
  port: 9090   # отдельный порт для /metrics; задать = http.port, чтобы отдавать на основном

# Внешние зависимости отключены по умолчанию — шаблон поднимается «голым».
# Переключи enabled: true и заполни секреты (env), когда подключишь зависимость.
postgres:
  enabled: true
  host: localhost
  port: 5432
  dbname: dpport
  user: gtport_app
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

keycloak:
  enabled: false   # false → /api отдаётся БЕЗ JWT-проверки (только для dev/шаблона)
  jwks_url: http://localhost:8180/realms/iqport/protocol/openid-connect/certs
  issuer: http://localhost:8180/realms/iqport
  audience: iqport-backend

log:
  level: debug
  # file: logs/service.log  # раскомментировать для записи в файл
  max_size_mb: 100
  max_backups: 5
  max_age_days: 30
